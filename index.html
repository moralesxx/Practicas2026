<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro de Carrera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-dark">JUEZ DE CARRERA</h1>
            <div class="border-top border-2 border-dark d-inline-block" style="width: 50px;"></div>
        </header>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4 text-dark">
                <div class="row g-3 align-items-center justify-content-center">
                    <div class="col-auto">
                        <label for="numCorredores" class="small text-uppercase fw-bold text-muted">Corredores:</label>
                    </div>
                    <div class="col-auto">
                        <input type="number" min="0" id="numCorredores" class="form-control text-center bg-light border-0" style="width: 80px;" value="0">
                    </div>
                    <div class="col-auto">
                        <div class="btn-group shadow-sm">
                            <button class="btn btn-white border" onclick="agregarUnCorredor()">+</button>
                            <button class="btn btn-white border text-danger" onclick="quitarUnCorredor()">-</button>
                        </div>
                        <button class="btn btn-dark fw-bold ms-2 px-4" onclick="crearCorredores()">CONFIGURAR</button>
                        <button class="btn btn-outline-secondary fw-bold ms-2" onclick="limpiarTablero()">LIMPIAR</button>
                    </div>
                </div>
                
                <hr class="my-4 opacity-10">

                <div class="d-flex flex-wrap gap-3 justify-content-center">
                    <button class="btn btn-outline-success px-4" id="btnIniciar" onclick="iniciarCarrera()">INICIAR</button>
                    <button class="btn btn-outline-secondary px-4" id="btnPausar" onclick="pausarCarrera()">PAUSAR</button>
                    <button class="btn btn-outline-danger px-4" onclick="resetearCarrera()">RESETEAR</button>
                    <button class="btn btn-link text-muted text-decoration-none" onclick="exportarPDF()">Exportar PDF</button>
                </div>
            </div>
        </div>

        <div id="corredores" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5"></div>
    </div>

    <div id="panelBotones" class="d-none d-lg-block border-start bg-white">
        <p class="text-center small fw-bold text-muted mb-3">MARCAR META</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
